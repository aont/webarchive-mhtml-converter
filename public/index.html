<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebArchive / MHTML Browser Converter</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 880px; margin: 2rem auto; padding: 0 1rem; line-height: 1.55; }
    label { display: block; margin: 0.75rem 0; }
    fieldset { border: 1px solid #ccc; padding: 1rem; margin: 1rem 0; }
    button { padding: 0.55rem 1rem; }
    pre { background: #f6f6f6; padding: 1rem; overflow: auto; }
  </style>
</head>
<body>
  <h1>WebArchive / MHTML Browser Converter</h1>

  <p>Convert <code>.mhtml/.mht to .webarchive</code> and <code>.webarchive to .mhtml</code> in your browser. Files are not sent to a server.</p>

  <label>
    Input file
    <input id="file" type="file" accept=".webarchive,.mhtml,.mht" />
  </label>

  <label>
    Conversion target
    <select id="target">
      <option value="auto">Auto-detect</option>
      <option value="webarchive">MHTML to WebArchive</option>
      <option value="mhtml">WebArchive to MHTML</option>
    </select>
  </label>

  <fieldset>
    <legend>MHTML to WebArchive</legend>
    <label><input id="inlineCidCss" type="checkbox" checked /> Inline cid: CSS links into style tags</label>
    <label>
      plist output format
      <select id="plistFormat">
        <option value="binary">binary</option>
        <option value="xml">xml</option>
      </select>
    </label>
  </fieldset>

  <fieldset>
    <legend>WebArchive to MHTML</legend>
    <label><input id="includeSubframes" type="checkbox" checked /> Include WebSubframeArchives</label>
  </fieldset>

  <button id="convert">Convert</button>

  <h2>Result</h2>
  <div id="result"></div>
  <pre id="log"></pre>

  <script type="module">
    import { convertFile, downloadBlob } from './webarchive-mhtml-browser.js';

    const fileInput = document.getElementById('file');
    const result = document.getElementById('result');
    const log = document.getElementById('log');

    document.getElementById('convert').addEventListener('click', async () => {
      result.textContent = '';
      log.textContent = '';

      const file = fileInput.files?.[0];
      if (!file) {
        log.textContent = 'Please choose an input file.';
        return;
      }

      try {
        const converted = await convertFile(file, {
          target: document.getElementById('target').value,
          inlineCidCss: document.getElementById('inlineCidCss').checked,
          plistFormat: document.getElementById('plistFormat').value,
          includeSubframes: document.getElementById('includeSubframes').checked,
        });

        const url = URL.createObjectURL(converted.blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = converted.filename;
        a.textContent = `Download ${converted.filename}`;
        result.appendChild(a);

        const btn = document.createElement('button');
        btn.textContent = 'Download now';
        btn.style.marginLeft = '1rem';
        btn.addEventListener('click', () => downloadBlob(converted.blob, converted.filename));
        result.appendChild(btn);

        const subresources = Array.isArray(converted.archive.WebSubresources)
          ? converted.archive.WebSubresources.length
          : 0;
        log.textContent = `Conversion complete\nOutput: ${converted.filename}\nSize: ${converted.blob.size.toLocaleString()} bytes\nSubresources: ${subresources}`;
      } catch (err) {
        console.error(err);
        log.textContent = `error: ${err?.message || err}`;
      }
    });
  </script>
</body>
</html>
